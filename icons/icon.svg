  <rect x="112" y="248" width="44" height="36" rx="8" fill="#2e2e3e"/>
  <rect x="168" y="248" width="44" height="36" rx="8" fill="#2e2e3e"/>
  <rect x="224" y="248" width="44" height="36" rx="8" fill="#2e2e3e"/>
  <rect x="280" y="248" width="44" height="36" rx="8" fill="#f5c842"/>
  <rect x="336" y="248" width="44" height="36" rx="8" fill="#2e2e3e"/>
  <!-- row 2 -->
  <rect x="112" y="296" width="44" height="36" rx="8" fill="#2e2e3e"/>
  <rect x="168" y="296" width="44" height="36" rx="8" fill="#2e2e3e"/>
  <rect x="224" y="296" width="44" height="36" rx="8" fill="#2e2e3e"/>
  <rect x="280" y="296" width="44" height="36" rx="8" fill="#2e2e3e"/>
