  <!-- row 3 -->
  <rect x="112" y="344" width="44" height="36" rx="8" fill="#2e2e3e"/>
  <rect x="168" y="344" width="44" height="36" rx="8" fill="#2e2e3e"/>
  <rect x="224" y="344" width="44" height="36" rx="8" fill="#2e2e3e"/>
