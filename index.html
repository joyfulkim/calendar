<style>
/* ─── TOKENS ─────────────────────────────────────── */
:root {
  --surface-0: #09090b;
  --surface-1: #111116;
  --surface-2: #1b1b22;
  --surface-3: #252530;
  --surface-border: #2a2a35;

  --accent: #e8c547;
  --accent-dim: #b89c35;
  --accent-glow: rgba(232,197,71,0.14);

  --label-rose:   #e05c6a;
  --label-amber:  #e8943a;
  --label-jade:   #3aad7c;
  --label-indigo: #6a7fe8;
  --label-slate:  #8899aa;
  --label-gold:   #e8c547;

  --text-1: #f0eff4;
  --text-2: #8888a0;
  --text-3: #44445a;
  --text-inv: #09090b;

  --font: 'Pretendard', 'Apple SD Gothic Neo', system-ui, -apple-system, sans-serif;

  --r-sm: 6px;
  --r-md: 12px;
  --r-lg: 20px;
  --r-pill: 9999px;

  --nav-h: 64px;
  --header-h: 52px;
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-t: env(safe-area-inset-top, 0px);

  --ease-snap: cubic-bezier(0.22, 1, 0.36, 1);
  --banner-h: 0px;
}

/* ─── RESET ──────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; height: 100dvh;
  background: var(--surface-0);
  color: var(--text-1);
  font-family: var(--font);
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
  user-select: none;
  -webkit-user-select: none;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea { font-family: inherit; }
* { scrollbar-width: none; }

/* ─── TOP HEADER ─────────────────────────────── */
#app-header {
  position: fixed;
  top: var(--banner-h, 0px); left: 0; right: 0;
  height: calc(var(--header-h) + var(--safe-t));
  padding-top: var(--safe-t);
  z-index: 1000;
  pointer-events: none;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-left: 8px;
  padding-right: 8px;
  background: rgba(17, 17, 22, 0.8);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--surface-border);
}
.app-hdr-btn {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--r-sm);
  font-size: 18px;
  color: var(--text-2);
  flex-shrink: 0;
  pointer-events: auto;
  transition: background 120ms, color 120ms;
  -webkit-tap-highlight-color: transparent;
}
.app-hdr-btn:active { background: var(--surface-3); color: var(--text-1); }

.app-hdr-logo {
  display: flex; align-items: center; gap: 7px;
  font-size: 15px; font-weight: 800;
  color: var(--text-1); letter-spacing: -0.03em;
  cursor: pointer;
  user-select: none; -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
  pointer-events: auto;
}
.app-hdr-logo-icon { font-size: 20px; }

.app-hdr-right {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 12px;
  flex-shrink: 0;
  padding-right: 4px;
  pointer-events: auto;
  width: auto;
}

/* ─── APP SHELL ──────────────────────────────────── */
#app {
  display: flex;
  flex-direction: column;
  height: calc(100dvh - var(--header-h) - var(--safe-t));
  margin-top: calc(var(--header-h) + var(--safe-t));
  max-width: 480px;
  width: 100%;
  margin-left: auto;
  margin-right: auto;
  position: relative;
  overflow: hidden;
}

/* ─── SCREENS ────────────────────────────────────── */
.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  transition: opacity 180ms ease, transform 240ms var(--ease-snap);
}
.screen.hidden {
  opacity: 0;
  pointer-events: none;
  transform: translateY(-6px);
}

#screen-week { background: var(--surface-0); }
#screen-month {
  background: var(--surface-0);
  padding-bottom: calc(var(--nav-h) + var(--safe-b));
}
#screen-day {
  background: var(--surface-1);
  transform: translateY(100%);
  transition: transform 300ms var(--ease-snap);
}
#screen-day.visible {
  transform: translateY(0);
  opacity: 1;
  pointer-events: auto;
}
#screen-day.hidden { transform: translateY(100%); opacity: 1; }

/* modal */
#modal-event {
  position: fixed;
  inset: 0;
  background: var(--surface-1);
  z-index: 1100;
  transform: translateY(100%);
  visibility: hidden;
  pointer-events: none;
  transition: transform 320ms var(--ease-snap), visibility 0ms 320ms;
  display: flex;
  flex-direction: column;
}
#modal-event.visible {
  transform: translateY(0);
  visibility: visible;
  pointer-events: auto;
  transition: transform 320ms var(--ease-snap), visibility 0ms 0ms;
}

/* ─── SHARED HEADER ──────────────────────────────── */
.header {
  padding: 14px 20px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--surface-border);
  flex-shrink: 0;
  background: var(--surface-0);
}
.header-back {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--r-sm);
  color: var(--text-2);
  font-size: 20px;
  transition: background 120ms;
}
.header-back:active { background: var(--surface-3); }

.period-label {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
}
.period-label .lbl-sub {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  color: var(--text-2);
  text-transform: uppercase;
}
.period-label .lbl-main {
  font-size: 20px;
  font-weight: 800;
  color: var(--text-1);
  letter-spacing: -0.02em;
}

.nav-btn {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--r-sm);
  color: var(--text-2);
  font-size: 20px;
  transition: background 120ms, color 120ms;
}
.nav-btn:active { background: var(--surface-3); color: var(--text-1); }

/* ─── BOTTOM NAV ─────────────────────────────────── */
#bottom-nav {
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  height: calc(var(--nav-h) + var(--safe-b));
  padding-bottom: var(--safe-b);
  background: rgba(17,17,22,0.93);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-top: 1px solid var(--surface-border);
  display: flex;
  align-items: center;
  justify-content: space-around;
  z-index: 500;
}
.nav-tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 3px;
  color: var(--text-3);
  transition: color 150ms;
  -webkit-tap-highlight-color: transparent;
  padding-bottom: 2px;
}
.nav-tab.active { color: var(--accent); }
.nav-tab-icon { font-size: 20px; line-height: 1; }
.nav-tab-label { font-size: 10px; font-weight: 600; letter-spacing: 0.02em; }
.nav-add {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}
.nav-add-circle {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: var(--accent);
  color: var(--text-inv);
  font-size: 28px;
  font-weight: 300;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 20px var(--accent-glow);
  transition: transform 100ms, box-shadow 100ms;
  -webkit-tap-highlight-color: transparent;
  margin-top: -10px;
}
.nav-add-circle:active { transform: scale(0.92); box-shadow: 0 0 6px var(--accent-glow); }

/* ─── WEEK SCREEN ────────────────────────────────── */
.week-nav-bar {
  display: flex;
  align-items: center;
  padding: 6px 0 0;
  border-bottom: 1px solid var(--surface-border);
  background: var(--surface-1);
  flex-shrink: 0;
}
.week-nav-arrow {
  width: 36px;
  height: 100%;
  min-height: 72px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  color: var(--text-2);
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
  transition: color 120ms;
}
.week-nav-arrow:active { color: var(--text-1); }

.week-strip {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  flex: 1;
  padding: 8px 0 10px;
  gap: 2px;
}
.week-day-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  padding: 6px 2px;
  border-radius: var(--r-md);
  cursor: pointer;
  transition: background 120ms;
  -webkit-tap-highlight-color: transparent;
  position: relative;
}
.week-day-col:active { background: var(--surface-3); }
.week-day-col.selected { background: var(--surface-2); }

.week-dow {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.05em;
  color: var(--text-3);
}
.week-day-col:first-child .week-dow { color: rgba(224,92,106,0.7); }
.week-day-col:last-child  .week-dow { color: rgba(106,127,232,0.7); }
.week-day-col.selected .week-dow { color: var(--text-2); }

.week-date-num {
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  font-size: 14px;
  font-weight: 700;
  color: var(--text-1);
}
.week-day-col.today .week-date-num {
  background: var(--accent);
  color: var(--text-inv);
  font-weight: 800;
}
.week-day-col.selected:not(.today) .week-date-num {
  outline: 1.5px solid var(--accent);
}

.week-dot-row {
  display: flex;
  gap: 2px;
  height: 5px;
  align-items: center;
  justify-content: center;
}
.week-dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  flex-shrink: 0;
}

.week-events-wrap {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.week-events-wrap::-webkit-scrollbar { display: none; }

.week-list-day-hdr {
  display: flex;
  align-items: baseline;
  cursor: pointer;
  gap: 6px;
  padding: 14px 16px 8px;
  border-bottom: 1px solid var(--surface-border);
  position: sticky;
  top: 0;
  background: var(--surface-0);
  z-index: 1;
}
.week-list-day-hdr.is-today .wldh-num { color: var(--accent); font-weight: 800; }
.week-list-day-hdr.is-sun .wldh-num { color: rgba(224,92,106,0.85); }
.week-list-day-hdr.is-sat .wldh-num { color: rgba(106,127,232,0.85); }
.wldh-num  { font-size: 15px; font-weight: 700; color: var(--text-1); letter-spacing: -0.02em; }
.wldh-dow  { font-size: 12px; color: var(--text-2); font-weight: 500; }
.wldh-today-badge {
  margin-left: auto;
  font-size: 10px; font-weight: 700;
  color: var(--text-inv); background: var(--accent);
  padding: 2px 7px; border-radius: var(--r-pill);
}
.week-list-day-events { padding: 8px 16px 4px; }
.week-list-day-empty  { padding: 6px 16px 14px; color: var(--text-3); font-size: 12px; }

.week-events-inner {
  padding-bottom: calc(var(--nav-h) + var(--safe-b) + 16px);
}

/* ─── MONTH SCREEN ───────────────────────────────── */
.weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  padding: 10px 4px 6px;
  flex-shrink: 0;
}
.weekday {
  text-align: center;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: var(--text-3);
  padding: 4px 0;
}
.weekday:first-child { color: rgba(224,92,106,0.6); }
.weekday:last-child  { color: rgba(106,127,232,0.6); }

#cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  grid-auto-rows: 1fr;
  padding: 0 4px;
  flex: 1;
  overflow: hidden;
  gap: 2px;
}
.cal-cell {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 4px 2px;
  border-radius: var(--r-sm);
  position: relative;
  min-height: 0;
  overflow: hidden;
  cursor: pointer;
  transition: background 120ms;
  -webkit-tap-highlight-color: transparent;
}
.cal-cell:active { background: var(--surface-3); }
.cal-cell.other-month .day-num { color: var(--text-3); opacity: 0.5; }
.cal-cell.selected {
  background: var(--surface-2);
  outline: 1.5px solid var(--accent);
  outline-offset: -1.5px;
}
.day-num {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-1);
  flex-shrink: 0;
}
.cal-cell.today .day-num {
  background: var(--accent);
  color: var(--text-inv);
  font-weight: 800;
}
.cal-ev-list {
  display: flex;
  flex-direction: column;
  gap: 1px;
  width: 100%;
  min-width: 0;
  margin-top: 1px;
}
.cal-ev-chip {
  font-size: 11px;
  line-height: 1.4;
  padding: 1px 3px;
  border-radius: 2px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: #fff;
  font-weight: 600;
}
.cal-ev-chip.cal-ev-rose   { background: #e05c6a; }
.cal-ev-chip.cal-ev-amber  { background: #d97706; }
.cal-ev-chip.cal-ev-jade   { background: #16a34a; }
.cal-ev-chip.cal-ev-indigo { background: #4f46e5; }
.cal-ev-chip.cal-ev-slate  { background: #64748b; }
.cal-ev-chip.cal-ev-gold   { background: #b45309; }

.swipe-hint {
  text-align: center;
  padding: 6px 0 2px;
  font-size: 10px;
  color: var(--text-3);
  letter-spacing: 0.05em;
  font-weight: 500;
  flex-shrink: 0;
}

/* ─── TOAST ──────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: calc(var(--nav-h) + var(--safe-b) + 12px);
  left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--surface-3); color: var(--text-1);
  font-size: 13px; font-weight: 600;
  padding: 10px 20px; border-radius: var(--r-pill);
  border: 1px solid var(--surface-border);
  white-space: nowrap; pointer-events: none;
  z-index: 2000; opacity: 0;
  transition: transform 250ms var(--ease-snap), opacity 250ms;
}
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* ─── ROUTINE SCREEN ─────────────────────────────── */
  .routine-list-wrap { padding: 16px 20px 80px; overflow-y: auto; flex: 1; }
  .routine-grid { display: grid; gap: 12px; }
  @media (min-width: 600px) { .routine-grid { grid-template-columns: 1fr 1fr; } }
  .routine-item { display: flex; align-items: center; background: var(--surface-1); padding: 12px 16px; border-radius: var(--r-md); border: 1px solid var(--surface-border); gap: 12px; }
  .routine-num { width: 28px; height: 28px; border-radius: 50%; background: var(--surface-2); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--text-2); flex-shrink: 0; }
  .routine-title { flex: 1; font-size: 15px; font-weight: 600; color: var(--text-1); line-height: 1.4; word-break: break-all; }
  .routine-priority {
    background: var(--surface-2); border: 1px solid var(--surface-border); border-radius: var(--r-sm); color: var(--text-1); font-size: 13px; padding: 6px; outline: none; flex-shrink: 0; cursor: pointer;
  }
  .routine-time-badge { font-size: 12px; background: rgba(106,127,232,0.15); color: var(--label-indigo); padding: 4px 6px; border-radius: 4px; font-weight: 700; white-space: nowrap; margin-left: 6px; }
  .routine-empty { padding: 40px 20px; font-size: 15px; color: var(--text-3); text-align: center; grid-column: 1 / -1; }
  .routine-time-input { background: var(--surface-1); border: 1px solid var(--surface-border); border-radius: var(--r-sm); padding: 12px 8px; font-size: 15px; color: var(--text-1); outline: none; width: 110px; }
  .btn-noti { background: rgba(255,255,255,0.1); border:none; padding:4px 8px; border-radius: 4px; color: #fff; font-size: 12px; cursor: pointer; display: none; }
  .btn-noti.visible { display: inline-block; }

  /* ─── PRAYER SCREEN ──────────────────────────────── */
  .prayer-header { padding: calc(var(--safe-t) + 20px) 24px 16px; padding-bottom: 0; display: flex; flex-direction: column; gap: 12px; }
  .prayer-add-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .prayer-input { flex: 1; min-width: 150px; background: var(--surface-1); border: 1px solid var(--surface-border); border-radius: var(--r-sm); padding: 12px 14px; font-size: 15px; color: var(--text-1); outline: none; }
  .prayer-select { width: 90px; background: var(--surface-1); border: 1px solid var(--surface-border); border-radius: var(--r-sm); padding: 12px 6px; font-size: 14px; color: var(--text-1); outline: none; cursor: pointer; }
  .prayer-tab-row { display: flex; gap: 4px; background: var(--surface-2); padding: 4px; border-radius: var(--r-sm); margin-top: 12px; }
  .prayer-tab { flex: 1; padding: 10px; font-size: 14px; font-weight: 600; color: var(--text-3); background: transparent; border: none; border-radius: calc(var(--r-sm) - 2px); cursor: pointer; transition: 150ms; }
  .prayer-tab.active { background: var(--surface-1); color: var(--text-1); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .prayer-list-wrap { padding: 16px 20px 80px; overflow-y: auto; flex: 1; }
  .prayer-item { background: var(--surface-1); border: 1px solid var(--surface-border); border-radius: var(--r-md); padding: 16px; margin-bottom: 12px; display: flex; flex-direction: column; gap: 12px; }
  .prayer-cat { align-self: flex-start; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; background: var(--surface-3); color: var(--text-2); }
  .prayer-title { font-size: 15px; line-height: 1.5; color: var(--text-1); word-break: break-all; margin: 0; }
  .prayer-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--surface-border); padding-top: 12px; }
  .prayer-date { font-size: 12px; color: var(--text-3); }
  .btn-answer { font-size: 13px; font-weight: 600; padding: 6px 12px; border-radius: 4px; background: var(--surface-3); color: var(--text-2); border: 1px solid var(--surface-border); cursor: pointer; }
  .prayer-item.answered .prayer-title { color: var(--text-3); }

/* ─── ANIMATIONS ─────────────────────────────────── */
@keyframes slideInLeft {
  from { transform: translateX(30px); opacity: 0; }
  to   { transform: translateX(0);    opacity: 1; }
}
@keyframes slideInRight {
  from { transform: translateX(-30px); opacity: 0; }
  to   { transform: translateX(0);     opacity: 1; }
}
.anim-left  { animation: slideInLeft  220ms var(--ease-snap); }
.anim-right { animation: slideInRight 220ms var(--ease-snap); }

/* date/time input dark fix */
input[type="date"]::-webkit-calendar-picker-indicator,
input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.5); cursor: pointer; }
input[type="date"], input[type="time"] { color-scheme: dark; }

/* ─── LOGIN SCREEN ───────────────────────────────── */
#login-screen {
  position: fixed;
  inset: 0;
  background: var(--surface-0);
  z-index: 900;
  display: flex;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 32px;
  opacity: 1;
  visibility: visible;
  transition: opacity 350ms, visibility 0ms;
}
#login-screen.hidden {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
  transition: opacity 350ms, visibility 0ms 350ms;
}

    { text: "우리가 선을 행하되 낙심하지 말지니 때가 이르면 거두리라", author: "갈라디아서 6:9" },
    { text: "이러므로 우리에게 구름 같이 둘러싼 허다한 증인들이 있으니… 인내로써 우리 앞에 당한 경주를 하며 믿음의 주요 또 온전하게 하시는 이인 예수를 바라보자", author: "히브리서 12:1-2" },

    { text: "두 손에 가득하고 수고하며 바람을 잡는 것보다 한 손에만 가득하고 평온함이 더 나으니라", author: "전도서 4:6" },
    { text: "수고하고 무거운 짐 진 자들아 다 내게로 오라 내가 너희를 쉬게 하리라 나는 마음이 온유하고 겸손하니 나의 멍에를 메고 내게 배우라", author: "마태복음 11:28-29" },
    { text: "네 눈은 바로 보며 네 눈꺼풀은 네 앞을 곧게 살펴 네 발이 행할 길을 평탄하게 하며 네 모든 길을 든든히 하라 좌로나 우로나 치우치지 말고 네 발을 악에서 떠나게 하라", author: "잠언 4:25-27" },
    { text: "주의 말씀은 내 발에 등이요 내 길에 빛이니이다", author: "시편 119:105" },
    { text: "너희 중에 누구든지 지혜가 부족하거든 모든 사람에게 후히 주시고 꾸짖지 아니하시는 하나님께 구하라 그리하면 주시리라", author: "야고보서 1:5" }
  ];

  // ── UTILITIES ───────────────────────────────────
  function toISO(d) { return d.toISOString().split('T')[0]; }
  function getWeekStart(date) { const d = new Date(date); d.setDate(d.getDate() - d.getDay()); return toISO(d); }
  function isInAppBrowser() { return /KAKAOTALK|Instagram|Line|NAVER|Whale|BAND/i.test(navigator.userAgent); }
  function isMobile() { return /Android|iPhone|iPad/i.test(navigator.userAgent); }
  function showToast(msg) {
    const t = $('toast');
    if(!t) return;
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }
  function moveWeek(delta) {
    const d = new Date(State.weekAnchor);
    d.setDate(d.getDate() + delta * 7);
    State.weekAnchor = toISO(d);
    renderCurrentView();
  }
  function moveCursor(delta) {
    let { year, month } = State.cursor;
    month += delta;
    if(month > 12) { month = 1; year++; }
    if(month < 1) { month = 12; year--; }
    State.cursor = { year, month };
    renderCurrentView();
    if(window.innerWidth >= 900) renderPC();
  }

  // ── FIREBASE INIT ────────────────────────────────
  function initFirebase() {
    firebase.initializeApp(firebaseConfig);
    auth = firebase.auth();
    db = firebase.firestore();
    auth.languageCode = 'ko';

    // Show random quote
    const q = QUOTES[Math.floor(Math.random() * QUOTES.length)];
    $('login-quote-text').textContent = q.text;
    $('login-quote-author').textContent = '— ' + q.author;

    // 모바일 리디렉션 로그인 결과 처리 (일부 브라우저에서 onAuthStateChanged 누락 방지)
    auth.getRedirectResult().then(result => {
      if(result && result.user) {
        const user = result.user;
        currentUser = user;
        $('login-screen').classList.add('hidden');
        $('btn-user-avatar').style.display = 'flex';
        renderUserInfo(user);
        startListeners(user.uid);
        switchScreen('week');
      }
    }).catch(e => {
      console.warn('Redirect result error:', e);
    });

    auth.onAuthStateChanged(user => {
      currentUser = user;
      if(user) {
        $('login-screen').classList.add('hidden');
        $('btn-user-avatar').style.display = 'flex';
        renderUserInfo(user);
        startListeners(user.uid);
        switchScreen('week');
      } else {
        $('login-screen').classList.remove('hidden');
        $('btn-user-avatar').style.display = 'none';
      }
    });

    const urlParams = new URLSearchParams(window.location.search);
    if(isInAppBrowser() || urlParams.get('p') === '1') {
      $('global-in-app-banner').classList.remove('hidden');
      $('in-app-notice').style.display = 'block';
      document.documentElement.style.setProperty('--banner-h', '50px');
    }
  }

  function signInWithGoogle() {
    const provider = new firebase.auth.GoogleAuthProvider();
    const persist = $('chk-persist').checked
      ? firebase.auth.Auth.Persistence.LOCAL
      : firebase.auth.Auth.Persistence.SESSION;
    showToast('로그인 요청 중...');
    auth.setPersistence(persist).then(() => {
      if(isInAppBrowser() || isMobile()) {
        auth.signInWithRedirect(provider);
      } else {
        auth.signInWithPopup(provider).catch(() => auth.signInWithRedirect(provider));
      }
    }).catch(e => { console.error(e); showToast('로그인 실패: ' + e.message); });
  }

  // ── LISTENERS ───────────────────────────────────
  function startListeners(uid) {
    db.collection('users').doc(uid).collection('events')
      .onSnapshot(snap => {
        State.events = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderCurrentView();
      });
    db.collection('users').doc(uid).collection('todos')
      .orderBy('createdAt', 'desc')
      .onSnapshot(snap => {
        TodoState.todos = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        if(State.view === 'todo') renderTodo();
        if(window.innerWidth >= 900) renderPC();
      });
    db.collection('users').doc(uid).collection('prayers')
      .orderBy('createdAt', 'desc')
      .onSnapshot(snap => {
        PrayerState.prayers = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        if(State.view === 'prayer') renderPrayer();
      });
    db.collection('users').doc(uid).collection('routines')
      .orderBy('createdAt', 'asc')
      .onSnapshot(snap => {
        RoutineState.routines = snap.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a, b) => (a.priority||5) - (b.priority||5));
        if(State.view === 'routine') renderRoutine();
      });
  }

  // ── RENDER ──────────────────────────────────────
  function renderCurrentView() {
    if(State.view === 'week')  renderWeek();
    else if(State.view === 'month') renderMonth();
    else if(State.view === 'day')   renderDay();
    else if(State.view === 'todo')  renderTodo();
    else if(State.view === 'routine') renderRoutine();
    else if(State.view === 'prayer')  renderPrayer();
    if(window.innerWidth >= 900) renderPC();
  }

  function renderWeek() {
    const start = new Date(State.weekAnchor);
    const strip = $('week-strip');
    strip.innerHTML = '';

    const end = new Date(start); end.setDate(end.getDate() + 6);
    $('lbl-week-main').textContent = `${start.getMonth()+1}월`;
    $('lbl-week-range').textContent = `${start.getFullYear()}년 ${start.getMonth()+1}월 ${start.getDate()}일 - ${end.getMonth()+1}월 ${end.getDate()}일`;

    for(let i = 0; i < 7; i++) {
      const d = new Date(start); d.setDate(d.getDate() + i);
      const iso = toISO(d);
      const col = document.createElement('div');
      col.className = `week-day-col ${iso===State.selected?'selected':''} ${iso===toISO(new Date())?'today':''}`;
      const dots = State.events.filter(e => e.date === iso).slice(0,3);
      col.innerHTML = `
        <div class="week-dow">${['일','월','화','수','목','금','토'][d.getDay()]}</div>
        <div class="week-date-num">${d.getDate()}</div>
        <div class="week-dot-row">${dots.map(e=>`<div class="week-dot" style="background:var(--label-${e.color||'gold'})"></div>`).join('')}</div>
      `;
      col.onclick = () => { State.selected = iso; renderCurrentView(); };
      strip.appendChild(col);
    }
    renderWeekEvents();
  }

  function renderWeekEvents() {
    const wrap = $('week-events-inner');
    wrap.innerHTML = '';
    const start = new Date(State.weekAnchor);
    for(let i = 0; i < 7; i++) {
      const d = new Date(start); d.setDate(d.getDate() + i);
      const iso = toISO(d);
      const evs = State.events.filter(e => e.date === iso);

      const hdr = document.createElement('div');
      hdr.className = `week-list-day-hdr ${iso===toISO(new Date())?'is-today':''} ${d.getDay()===0?'is-sun':''} ${d.getDay()===6?'is-sat':''}`;
      hdr.innerHTML = `<span class="wldh-num">${d.getDate()}</span><span class="wldh-dow">${['일','월','화','수','목','금','토'][d.getDay()]}</span>`;
      if(iso === toISO(new Date())) hdr.innerHTML += `<span class="wldh-today-badge">오늘</span>`;
      hdr.onclick = () => { State.selected = iso; switchScreen('day'); };
      wrap.appendChild(hdr);

      const list = document.createElement('div');
      list.className = 'week-list-day-events';
      if(evs.length === 0) {
        list.innerHTML = `<div class="week-list-day-empty">일정 없음</div>`;
      } else {
        evs.forEach(e => {
          const item = document.createElement('div');
          item.className = 'todo-item';

  function renderTodo() {
    const wrap = $('todo-list-wrap');
    wrap.innerHTML = '';
    const active = TodoState.todos.filter(t => !t.done);
    const done   = TodoState.todos.filter(t =>  t.done);

    if(active.length) {
      const lbl = document.createElement('div'); lbl.className='todo-section-lbl'; lbl.textContent='진행 중'; wrap.appendChild(lbl);
      active.forEach(t => wrap.appendChild(createTodoEl(t)));

  function createTodoEl(t) {
    const el = document.createElement('div');
    el.className = `todo-item ${t.done?'done':''}`;
    el.innerHTML = `<div class="todo-check">✔</div><div class="todo-body"><div class="todo-title">${t.text}</div></div><button class="todo-del">✕</button>`;
    el.querySelector('.todo-check').onclick = ev => {
      ev.stopPropagation();
      db.collection('users').doc(currentUser.uid).collection('todos').doc(t.id).update({ done: !t.done });
    };
    el.querySelector('.todo-del').onclick = ev => {
      ev.stopPropagation();
      db.collection('users').doc(currentUser.uid).collection('todos').doc(t.id).delete();

  // ── ROUTINE ───────────────────────────────────────
  function renderRoutine() {
    const wrap = $('routine-grid');
    if (!wrap) return;
    wrap.innerHTML = '';
    if(!RoutineState.routines.length) {
      wrap.innerHTML = `<div class="routine-empty">등록된 루틴이 없습니다.</div>`;

  function createRoutineEl(r, idx) {
    const el = document.createElement('div');
    el.className = 'routine-item';
    
    let options = '';
    for(let i=1; i<=5; i++) {
      options += `<option value="${i}" ${r.priority == i ? 'selected' : ''}>${i}순위</option>`;
    }

    const timeBadge = r.time ? `<span class="routine-time-badge">${r.time}</span>` : '';

    el.innerHTML = `
      <div class="routine-num">${idx + 1}</div>
      <div class="routine-title">${r.text}${timeBadge}</div>
      <select class="routine-priority">${options}</select>
      <button class="todo-del" style="position:static;margin-left:auto">✕</button>
    `;
    el.querySelector('.routine-priority').onchange = ev => {
      db.collection('users').doc(currentUser.uid).collection('routines').doc(r.id).update({ priority: parseInt(ev.target.value) });
    };
    el.querySelector('.todo-del').onclick = ev => {
      ev.stopPropagation();
      db.collection('users').doc(currentUser.uid).collection('routines').doc(r.id).delete();
    };
    return el;

  // ── PRAYER ────────────────────────────────────────
  function renderPrayer() {
    const wrap = $('prayer-list-wrap');
    if (!wrap) return;
    wrap.innerHTML = '';
    const isDoneTab = PrayerTab === 'done';
    
    // Sort logic
    let list = PrayerState.prayers.filter(p => !!p.answered === isDoneTab);
    if(isDoneTab) {
      list.sort((a,b) => (b.answeredAt?.toMillis() || 0) - (a.answeredAt?.toMillis() || 0));
    }
    
    if(!list.length) {
      wrap.innerHTML = `<div class="todo-empty">기도제목이 없습니다.</div>`;
      return;
    }
    list.forEach(p => wrap.appendChild(createPrayerEl(p)));
  }

  function createPrayerEl(p) {
    const el = document.createElement('div');
    el.className = `prayer-item ${p.answered ? 'answered' : ''}`;
    
    let formattedDate = '';
    if(p.answeredAt) {
      const d = p.answeredAt.toDate ? p.answeredAt.toDate() : new Date(p.answeredAt);
      formattedDate = `응답: ${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}.`;
    } else if(p.createdAt) {
      const d = p.createdAt.toDate ? p.createdAt.toDate() : new Date(p.createdAt);
      formattedDate = `작성: ${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}.`;
    }

    const answerBtnHtml = p.answered 
      ? `<div style="flex:1"></div>` 
      : `<button class="btn-answer">응답완료</button>`;

    const catColors = {
      '개인': 'var(--label-indigo)',
      '교회': 'var(--label-gold)',
      '가족': 'var(--label-amber)',
      '친구': 'var(--label-jade)',
      '동역자': 'var(--label-rose)',
      '행사': 'var(--label-slate)',
      '기타': 'var(--surface-3)'
    };
    const cColor = catColors[p.category] || 'var(--surface-3)';

    el.innerHTML = `
      <div style="display:flex; justify-content:space-between">
        <span class="prayer-cat" style="background:${cColor}; color:#fff">${p.category || '기타'}</span>
        <button class="todo-del" style="position:static; padding:4px">✕</button>
      </div>
      <p class="prayer-title">${p.text}</p>
      <div class="prayer-footer">
        <span class="prayer-date">${formattedDate}</span>
        ${answerBtnHtml}
      </div>
    `;

    el.querySelector('.todo-del').onclick = ev => {
      ev.stopPropagation();
      db.collection('users').doc(currentUser.uid).collection('prayers').doc(p.id).delete();
    };

    if(!p.answered) {
      el.querySelector('.btn-answer').onclick = ev => {
        ev.stopPropagation();
        db.collection('users').doc(currentUser.uid).collection('prayers').doc(p.id).update({
          answered: true,
          answeredAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      };
    }
    return el;
  }

      if(e.key==='Enter') {
        e.preventDefault();

      }
    };
  }

  // ── EVENT MODAL ─────────────────────────────────
  function openEventModal(ev) {
    editingEventId = ev ? ev.id : null;
    selectedColor  = ev ? (ev.color || 'gold') : 'gold';

    $('modal-title-text').textContent = ev ? '일정 편집' : '새 일정';
    $('ev-title').value = ev ? ev.title : '';
    $('ev-date').value  = ev ? ev.date : State.selected;
    $('btn-modal-delete').style.display = ev ? 'block' : 'none';

    const colorRow = $('ev-color-row');
    colorRow.innerHTML = '';
    COLORS.forEach(c => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.style.cssText = `width:28px;height:28px;border-radius:50%;background:var(--label-${c});border:2.5px solid ${c===selectedColor?'white':'transparent'};transition:border-color 120ms;cursor:pointer;`;
      btn.onclick = () => {
        selectedColor = c;
        colorRow.querySelectorAll('button').forEach((b,i) => b.style.borderColor = COLORS[i]===c?'white':'transparent');
      };
      colorRow.appendChild(btn);
    });

    $('modal-event').classList.add('visible');
    setTimeout(() => $('ev-title').focus(), 150);
  }

  function closeEventModal() {
    $('modal-event').classList.remove('visible');
    editingEventId = null;
  }

  function saveEvent() {
    const title = $('ev-title').value.trim();
    if(!title) { showToast('제목을 입력하세요'); return; }
    if(!currentUser) return;

    const data = { title, date: $('ev-date').value, color: selectedColor };
    const col = db.collection('users').doc(currentUser.uid).collection('events');

    if(editingEventId) {
      col.doc(editingEventId).update(data)
        .then(() => { showToast('일정이 수정되었습니다'); closeEventModal(); })
        .catch(e => showToast('오류: ' + e.message));
    } else {
      col.add({ ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp() })
        .then(() => { showToast('일정이 추가되었습니다'); closeEventModal(); })
        .catch(e => showToast('오류: ' + e.message));
    }
  }

  function deleteEvent() {
    if(!editingEventId || !currentUser) return;
    if(!confirm('이 일정을 삭제할까요?')) return;
    db.collection('users').doc(currentUser.uid).collection('events').doc(editingEventId).delete()
      .then(() => { showToast('일정이 삭제되었습니다'); closeEventModal(); })
      .catch(e => showToast('오류: ' + e.message));
  }

  // ── SCREEN SWITCH ────────────────────────────────
  function switchScreen(id) {
    ['week','month','todo','day','routine','prayer'].forEach(s => {
      const el = $('screen-' + s);
      if(!el) return;
      if(s === id) { el.classList.remove('hidden'); if(s==='day') el.classList.add('visible'); }
      else         { el.classList.add('hidden');    if(s==='day') el.classList.remove('visible'); }
    });
    State.view = id;
    renderCurrentView();
    updateNav();
  }

    ['week','todo','routine','prayer','day','month'].forEach(t => {
      const el = $('tab-' + t);
      if(el) {

        else el.classList.remove('active');
      }
    });
  }

  // ── SWIPE GESTURES ──────────────────────────────
  function initSwipe(el, onLeft, onRight) {
    let startX = 0, startY = 0;
    el.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
    }, { passive: true });
    el.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - startX;
      const dy = e.changedTouches[0].clientY - startY;
      if(Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
        dx < 0 ? onLeft() : onRight();
      }
    }, { passive: true });
  }

  $('tab-routine').onclick = () => switchScreen('routine');
  $('tab-prayer').onclick  = () => switchScreen('prayer');
  $('tab-day').onclick     = () => switchScreen('day');

  // Todo
  $('btn-todo-add').onclick = addTodo;
  $('todo-input').addEventListener('keydown', e => {
    if(e.isComposing || e.keyCode === 229) return;
    if(e.key === 'Enter') { e.preventDefault(); addTodo(); }
  });

  // Routine
  $('btn-routine-add').onclick = addRoutine;
  $('routine-input').addEventListener('keydown', e => {
    if(e.isComposing || e.keyCode === 229) return;
    if(e.key === 'Enter') { e.preventDefault(); addRoutine(); }
  });

  // Prayer
  $('btn-prayer-add').onclick = addPrayer;
  $('prayer-input').addEventListener('keydown', e => {
    if(e.isComposing || e.keyCode === 229) return;
    if(e.key === 'Enter') { e.preventDefault(); addPrayer(); }
  });
  $('tab-pr-active').onclick = () => {
    PrayerTab = 'active';
    $('tab-pr-active').classList.add('active');
    $('tab-pr-done').classList.remove('active');
    renderCurrentView();
  };
  $('tab-pr-done').onclick = () => {
    PrayerTab = 'done';
    $('tab-pr-done').classList.add('active');
    $('tab-pr-active').classList.remove('active');
    renderCurrentView();
  };

  // Click outside user menu
  window.addEventListener('click', e => {
    if(!e.target.closest('#user-menu') && !e.target.closest('#btn-user-avatar')) {
      $('user-menu').classList.add('hidden');
    }
  });

  // Swipe: week events wrap
  const weekWrap = $('week-events-wrap');
  if(weekWrap) initSwipe(weekWrap,
    () => moveWeek(1),
    () => moveWeek(-1)
  );
  // Swipe: month cal grid
  const calGrid = $('cal-grid');
  if(calGrid) initSwipe(calGrid,
    () => moveCursor(1),
    () => moveCursor(-1)
  );

  // Service Worker
  if('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }

  // Notifications 
  const btnNoti = $('btn-request-noti');
  if(btnNoti) {
    if(!('Notification' in window)) {
      btnNoti.style.display = 'none';
    } else if(Notification.permission === 'granted') {
      btnNoti.classList.remove('visible');
    }
    
    btnNoti.onclick = () => {
      if(!('Notification' in window)) return;
      Notification.requestPermission().then(perm => {
        if(perm === 'granted') {
          btnNoti.classList.remove('visible');
          showToast('알림이 허용되었습니다.');
        } else {
          showToast('알림 권한이 거부되었습니다.');
        }
      });
    };
  }

  let notifiedMemory = {};
  setInterval(() => {
    if(!('Notification' in window) || Notification.permission !== 'granted') return;
    const now = new Date();
    const currentHM = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    const todayStr = now.toISOString().split('T')[0];

    RoutineState.routines.forEach(r => {
      if(!r.time) return;
      if(r.time === currentHM) {
        const memoryKey = r.id + '_' + todayStr;
        if(!notifiedMemory[memoryKey]) {
          notifiedMemory[memoryKey] = true;
          // Trigger Push
          if(navigator.serviceWorker && !!navigator.serviceWorker.controller) {
            navigator.serviceWorker.ready.then(reg => {
              reg.showNotification('루틴 진행을 잊지마세요!', {
                body: r.text,
                icon: '/icons/icon.svg',
                tag: r.id,
                vibrate: [200, 100, 200]
              });
            });
          } else {
             new Notification('루틴 진행을 잊지마세요!', { body: r.text, icon: '/icons/icon.svg' });
          }
        }
      }
    });
  }, 30000);

  initFirebase();
})();
</script>
</body>
</html>
